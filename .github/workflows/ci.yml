name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      # eslint with --max-warnings 0 (see package.json "lint")
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # NextAuth / Auth.js expects a secret during build when auth routes are compiled
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
          AUTH_URL: https://mynanganallur.in
          NEXT_PUBLIC_SITE_URL: https://mynanganallur.in
